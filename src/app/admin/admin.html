<div class="admin-shell" *transloco="let t">
  <mat-toolbar color="primary">
    <button mat-icon-button (click)="sidenav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <span>{{ t('app.title') }}</span>
    <span class="toolbar-spacer"></span>
    <app-lang-switcher />
    <app-theme-toggle />
    <app-sign-out-button />
  </mat-toolbar>

  <mat-sidenav-container>
    <mat-sidenav #sidenav mode="side" opened>
      <mat-nav-list>
        <a mat-list-item routerLink="registrations" routerLinkActive #rlaReg="routerLinkActive" [activated]="rlaReg.isActive">
          <mat-icon matListItemIcon>app_registration</mat-icon>
          <span matListItemTitle>{{ t('nav.registrations') }}</span>
        </a>
        <a mat-list-item routerLink="users" routerLinkActive #rlaUsers="routerLinkActive" [activated]="rlaUsers.isActive">
          <mat-icon matListItemIcon>people</mat-icon>
          <span matListItemTitle>{{ t('nav.users') }}</span>
        </a>
        <a mat-list-item routerLink="settings" routerLinkActive #rlaSettings="routerLinkActive" [activated]="rlaSettings.isActive">
          <mat-icon matListItemIcon>settings</mat-icon>
          <span matListItemTitle>{{ t('nav.settings') }}</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <div class="content">
        <router-outlet />
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
