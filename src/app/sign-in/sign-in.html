<app-auth-layout>
  <span authLayoutTitle *transloco="let t">{{ t('signIn.title') }}</span>
  <div class="vertical-container" *transloco="let t">
    <mat-form-field>
      <mat-label>{{ t('signIn.username') }}</mat-label>
      <input matInput type="text" [formControl]="usernameFC" />
      @if (usernameFC.hasError('required')) {
        <mat-error>{{ t('signIn.errors.usernameRequired') }}</mat-error>
      }
    </mat-form-field>
    <mat-form-field>
      <mat-label>{{ t('signIn.password') }}</mat-label>
      <input matInput type="password" [formControl]="passwordFC" #passwordInput />
      <button
        mat-icon-button
        matSuffix
        (click)="passwordInput.type === 'password' ? (passwordInput.type = 'text') : (passwordInput.type = 'password')"
        type="button"
      >
        <mat-icon>{{ passwordInput.type === 'password' ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      @if (passwordFC.hasError('required')) {
        <mat-error>{{ t('signIn.errors.passwordRequired') }}</mat-error>
      }
    </mat-form-field>
    <button mat-flat-button color="primary" class="full-width" (click)="onSubmit()" [disabled]="submitting() || signInFG.invalid">
      {{ t('signIn.submit') }}
    </button>
  </div>
</app-auth-layout>
