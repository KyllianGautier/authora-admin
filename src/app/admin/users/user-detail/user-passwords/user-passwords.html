<div class="tab-content" *transloco="let t">
  @if (loading()) {
    <div class="tab-loading"><mat-spinner diameter="32" /></div>
  } @else if (passwords().length) {
    <table mat-table [dataSource]="passwords()">
      <ng-container matColumnDef="revoked">
        <th mat-header-cell *matHeaderCellDef>{{ t('userDetail.status') }}</th>
        <td mat-cell *matCellDef="let row">
          <mat-chip [highlighted]="row.revoked">{{ row.revoked ? t('userDetail.revoked') : t('userDetail.active') }}</mat-chip>
        </td>
      </ng-container>
      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>{{ t('userDetail.createdAt') }}</th>
        <td mat-cell *matCellDef="let row">{{ row.createdAt | date: 'medium' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          @if (!row.revoked) {
            <button mat-icon-button color="warn" (click)="revoke(row)">
              <mat-icon>block</mat-icon>
            </button>
          }
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
  } @else {
    <p class="empty">{{ t('userDetail.noPasswords') }}</p>
  }
</div>
